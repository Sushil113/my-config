[window]
dimensions = { columns = 120, lines = 30 }
padding = { x = 5, y = 5 }
dynamic_padding = true
decorations = "full"  # Options: full, none, transparent, buttonless
startup_mode = "Windowed"  # Options: Windowed, Maximized, Fullscreen
opacity = 1.0  # Value between 0.0 (transparent) and 1.0 (opaque)

[font]
normal = { family = "MesloLGM Nerd Font Mono", style = "Regular" }
bold = { family = "MesloLGM Nerd Font Mono", style = "Bold" }
italic = { family = "MesloLGM Nerd Font Mono", style = "Italic" }
bold_italic = { family = "MesloLGM Nerd Font Mono", style = "Bold Italic" }
size = 13.0

[font.offset]
x = 0
y = 4

[font.glyph_offset]
x = 0
y = 0

[selection]
save_to_clipboard = true

[scrolling]
history = 10000
multiplier = 3

[mouse]
hide_when_typing = false

[general]
import = [
  "~/.config/alacritty/themes/themes/dracula.toml"
]

[terminal]

# Shell (uncomment and modify if needed)
[terminal.shell]
program = "/usr/bin/bash"
# args = ["--login"]
